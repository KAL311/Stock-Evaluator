# Sector-specific metric maps, weights, and hard exclusion rules.
# Keyed by GICS industry code (6-digit) or sub-industry code (8-digit).
# Fallback chain: sub-industry -> industry -> sector -> default.
# 
# References:
#   §5.2 - Sector-Specific Metric Maps (Framework)
#   §5.4 - Sector-Specific Factor Weights
#
# weight: one of 'V' (Valuation), 'Q' (Quality), 'G' (Growth), 'S' (Sentiment)
# higher_is_better: True if higher raw value = better (default True)
---
defaults:
  weights: {V: 0.30, Q: 0.30, G: 0.25, S: 0.15}
  min_coverage: 0.50
  rank_group_min: 8

sectors:
  # ============= ENERGY (GICS 1010) =============
  "101010": &energy_services  # Energy Equipment & Services
    valuation: [ev_ebitda, fcf_yield]
    quality: [roce_3y, fcf_margin_3y_med, debt_ebitda_inv]
    growth: [revenue_growth_3yr, ebitda_trend_5y]
    sentiment: [eps_revision_90d, price_mom_12_1, return_6m]
    weights: {V: 0.40, Q: 0.25, G: 0.15, S: 0.20}
    hard_exclude:
      debt_ebitda: {op: ">", value: 2.5}

